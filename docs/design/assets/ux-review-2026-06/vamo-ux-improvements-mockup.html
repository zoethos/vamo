document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 16px; font-size:13px; line-height:1.55; color:#2A2E3A\">\"Split the costs, capture the journey, <b>share the story<\u002Fb>.\" Wave 1 ships split + capture + a static snapshot card — but the <i>story<\u002Fi> is just a \"recap video — coming soon\" door. A tappable Wrapped is the highest-emotion share in the app and the strongest re-engagement hook at trip close.<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:16px\">\n          <div style=\"display:flex; gap:12px\"><span style=\"flex:none; width:22px; height:22px; border-radius:50%; background:#C6FF00; color:#0C0E16; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; border:1.5px solid #0C0E16\">1<\u002Fspan><p style=\"margin:0; font-size:13px; line-height:1.55; color:#2A2E3A\"><b>Story format<\u002Fb> (tap to advance) — familiar, screenshot-friendly, and every frame is a share moment that carries the permanent watermark.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex; gap:12px\"><span style=\"flex:none; width:22px; height:22px; border-radius:50%; background:#C6FF00; color:#0C0E16; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; border:1.5px solid #0C0E16\">2<\u002Fspan><p style=\"margin:0; font-size:13px; line-height:1.55; color:#2A2E3A\"><b>Built from data you already have<\u002Fb> — totals, photo counts, members, places. It's the Tally/Wrapped surface the roadmap names, dressed for sharing.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:18px; padding-top:16px; border-top:1px solid #E9ECF2; font-size:12px; line-height:1.5; color:#6b7280\">Directly serves the Wave-2/3 retention metric: \"day-after-close retention ≥35%.\"<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SECTION 06 · ACROSS THE REST -->\n  <div style=\"margin-top:52px; margin-bottom:8px\">\n    <div style=\"font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#6b7280; margin-bottom:18px\">06 · Across the rest of the app — review notes<\u002Fdiv>\n    <div style=\"width:1240px; max-width:100%; background:#fff; border-radius:18px; padding:30px 32px; box-shadow:0 1px 3px rgba(0,0,0,.08); box-sizing:border-box\">\n\n      <div style=\"font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#6A2D6F; margin-bottom:12px\">Android platform hygiene — apply globally<\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:26px\">\n        <span style=\"font-size:12px; font-weight:600; color:#2A2E3A; background:#F5FBE0; border:1px solid #C6FF00; padding:6px 12px; border-radius:999px\">M3 NavigationBar + docked FAB (not a hand-rolled BottomAppBar)<\u002Fspan>\n        <span style=\"font-size:12px; font-weight:600; color:#2A2E3A; background:#F5FBE0; border:1px solid #C6FF00; padding:6px 12px; border-radius:999px\">Edge-to-edge + predictive back (Android 14+)<\u002Fspan>\n        <span style=\"font-size:12px; font-weight:600; color:#2A2E3A; background:#F5FBE0; border:1px solid #C6FF00; padding:6px 12px; border-radius:999px\">Dynamic-type-safe layouts — retire the trip-hero's magic-number math<\u002Fspan>\n        <span style=\"font-size:12px; font-weight:600; color:#2A2E3A; background:#F5FBE0; border:1px solid #C6FF00; padding:6px 12px; border-radius:999px\">Credential Manager sign-in (one-tap Google/Passkeys)<\u002Fspan>\n        <span style=\"font-size:12px; font-weight:600; color:#2A2E3A; background:#F5FBE0; border:1px solid #C6FF00; padding:6px 12px; border-radius:999px\">48dp targets · brand palette locked over Material You<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:22px 28px\">\n        <div>\n          <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:6px\"><span style=\"font-family:'Material Symbols Outlined'; font-size:19px; color:#6A2D6F\">login<\u002Fspan><span style=\"font-size:14px; font-weight:700\">Auth / onboarding<\u002Fspan><span style=\"font-size:10px; font-weight:700; color:#00A892; background:#E2F8F3; padding:2px 7px; border-radius:999px\">BUILT<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0; font-size:12.5px; line-height:1.55; color:#2A2E3A\">Email OTP + Apple/Google + QR all work. It's also the first impression and reads like default Material — warm it toward the board (gradient/pattern), and render the real wordmark asset instead of the text \"VAMO\".<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:6px\"><span style=\"font-family:'Material Symbols Outlined'; font-size:19px; color:#6A2D6F\">account_balance_wallet<\u002Fspan><span style=\"font-size:14px; font-weight:700\">Expenses tab (money home)<\u002Fspan><span style=\"font-size:10px; font-weight:700; color:#00A892; background:#E2F8F3; padding:2px 7px; border-radius:999px\">BUILT<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0; font-size:12.5px; line-height:1.55; color:#2A2E3A\">Make it unambiguously a cross-trip <b>aggregator<\u002Fb> — balance header + per-trip rollups + period strip — that drills into each trip, and the home for the FAB's \"+expense\" trip-picker. Avoid it feeling like a second flat expense list.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:6px\"><span style=\"font-family:'Material Symbols Outlined'; font-size:19px; color:#6A2D6F\">timeline<\u002Fspan><span style=\"font-size:14px; font-weight:700\">Activity feed<\u002Fspan><span style=\"font-size:10px; font-weight:700; color:#00A892; background:#E2F8F3; padding:2px 7px; border-radius:999px\">BUILT<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0; font-size:12.5px; line-height:1.55; color:#2A2E3A\">Solid day-grouped feed, but it overlaps the trip dashboard's \"Recent activity.\" Make global Activity the cross-trip story and trim or relabel the per-trip duplicate. Move off M2 Card+ListTile to M3; add trip thumbnails/avatars.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:6px\"><span style=\"font-family:'Material Symbols Outlined'; font-size:19px; color:#6A2D6F\">person<\u002Fspan><span style=\"font-size:14px; font-weight:700\">Profile / settings<\u002Fspan><span style=\"font-size:10px; font-weight:700; color:#00A892; background:#E2F8F3; padding:2px 7px; border-radius:999px\">BUILT<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0; font-size:12.5px; line-height:1.55; color:#2A2E3A\">One long scroll of headers. Add a profile header (avatar + name + \"Si va?\"), group into M3 list sections with dividers, and consider a pinned save / snackbar instead of a bottom button. Good discipline: primary is never lime.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:6px\"><span style=\"font-family:'Material Symbols Outlined'; font-size:19px; color:#6A2D6F\">event<\u002Fspan><span style=\"font-size:14px; font-weight:700\">Plan / Events<\u002Fspan><span style=\"font-size:10px; font-weight:700; color:#C77800; background:#FFF1DC; padding:2px 7px; border-radius:999px\">WAVE 2<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0; font-size:12.5px; line-height:1.55; color:#2A2E3A\">RSVP chips (Going/Maybe/Declined) match the board. This is the surface that must earn <i>daily<\u002Fi> opens — surface \"next up\" on the trip dashboard and the home Activity feed, not only inside the trip's Plan tab.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:6px\"><span style=\"font-family:'Material Symbols Outlined'; font-size:19px; color:#6A2D6F\">group_add<\u002Fspan><span style=\"font-size:14px; font-weight:700\">Members &amp; invite<\u002Fspan><span style=\"font-size:10px; font-weight:700; color:#00A892; background:#E2F8F3; padding:2px 7px; border-radius:999px\">BUILT<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0; font-size:12.5px; line-height:1.55; color:#2A2E3A\">QR + link + contacts is the cheapest viral lever — strong. Don't bury it: surface invite on the dashboard avatar row and the empty-balances state. The board's \"Invite link / QR code / Contacts\" trio is the right model.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:6px\"><span style=\"font-family:'Material Symbols Outlined'; font-size:19px; color:#6A2D6F\">ios_share<\u002Fspan><span style=\"font-size:14px; font-weight:700\">Snapshot share<\u002Fspan><span style=\"font-size:10px; font-weight:700; color:#00A892; background:#E2F8F3; padding:2px 7px; border-radius:999px\">BUILT<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0; font-size:12.5px; line-height:1.55; color:#2A2E3A\">On-brand and the seed of the growth loop. Wire the destination theme packs (Wave 2) so each trip's card differs, keep the permanent watermark, and make Wrapped (05) feed from the same composer.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:6px\"><span style=\"font-family:'Material Symbols Outlined'; font-size:19px; color:#6A2D6F\">task_alt<\u002Fspan><span style=\"font-size:14px; font-weight:700\">Close report<\u002Fspan><span style=\"font-size:10px; font-weight:700; color:#C77800; background:#FFF1DC; padding:2px 7px; border-radius:999px\">WAVE 2<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0; font-size:12.5px; line-height:1.55; color:#2A2E3A\">Deemed-acceptance closure is a genuinely thoughtful model. Keep the report calm and financial; let the emotional payoff live in Wrapped right next to it at trip close.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:6px\"><span style=\"font-family:'Material Symbols Outlined'; font-size:19px; color:#6A2D6F\">public<\u002Fspan><span style=\"font-size:14px; font-weight:700\">Web share pages<\u002Fspan><span style=\"font-size:10px; font-weight:700; color:#7A4FB5; background:#F1E8F8; padding:2px 7px; border-radius:999px\">ROADMAP W2<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0; font-size:12.5px; line-height:1.55; color:#2A2E3A\">View-before-install pages (domain-gated). The invite/snapshot links should open a themed web preview of the trip — closing the loop for invitees without the app and lifting the viral coefficient.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1300,&quot;height&quot;:900},&quot;showAnnotations&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;fabColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#C6FF00&quot;,&quot;options&quot;:[&quot;#C6FF00&quot;,&quot;#FF5B4D&quot;,&quot;#00C2A8&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    cents: 6420,\n    splitMode: 'equal',\n    mapDay: 5,\n    traces: { you: true, mara: true, luca: false },\n    wrapped: 0,\n  };\n\n  setMapDay(e) { this.setState({ mapDay: Number(e.target.value) }); }\n  toggleTrace(k) { this.setState((s) => ({ traces: { ...s.traces, [k]: !s.traces[k] } })); }\n  wrappedNext() { this.setState((s) => ({ wrapped: (s.wrapped + 1) % 4 })); }\n\n  members = [\n    { name: 'You',   initial: 'Y', color: '#FF5B4D' },\n    { name: 'Mara',  initial: 'M', color: '#00C2A8' },\n    { name: 'Luca',  initial: 'L', color: '#6A2D6F' },\n    { name: 'Sofia', initial: 'S', color: '#FFA766' },\n  ];\n\n  fmt(c) {\n    return '€' + (c / 100).toFixed(2);\n  }\n\n  press(d) {\n    if (d === '.') return;\n    const c = this.state.cents * 10 + Number(d);\n    if (c > 99999999) return;\n    this.setState({ cents: c });\n  }\n\n  back() {\n    this.setState({ cents: Math.floor(this.state.cents / 10) });\n  }\n\n  renderVals() {\n    const cents = this.state.cents;\n    const n = this.members.length;\n    const each = Math.round(cents / n);\n    const members = this.members.map((m) => ({ ...m, share: this.fmt(each) }));\n\n    const keys = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '.', '0', '⌫'].map((k) => ({\n      label: k,\n      onTap: () => (k === '⌫' ? this.back() : this.press(k)),\n    }));\n\n    const isEqual = this.state.splitMode === 'equal';\n    const base = 'flex:1; text-align:center; padding:8px 0; font-size:12px; font-weight:600; border:none; border-radius:7px; cursor:pointer; font-family:inherit;';\n    const sel = 'background:#0C0E16; color:#fff;';\n    const unsel = 'background:transparent; color:#6b7280;';\n\n    return {\n      amountDisplay: this.fmt(cents),\n      perPersonDisplay: this.fmt(each),\n      members,\n      keys,\n      isEqual,\n      isCustom: !isEqual,\n      equalBtnStyle: base + (isEqual ? sel : unsel),\n      customBtnStyle: base + (!isEqual ? sel : unsel),\n      setEqual: () => this.setState({ splitMode: 'equal' }),\n      setCustom: () => this.setState({ splitMode: 'custom' }),\n      fab: this.props.fabColor ?? '#C6FF00',\n      showNotes: this.props.showAnnotations ?? true,\n\n      // — Trip Map (Wave 3) —\n      mapDay: this.state.mapDay,\n      mapDayLabel: 'Day ' + this.state.mapDay + ' of 8',\n      mapPins: [\n        { d: 1, l: '16%', t: '79%', c: '#FF5B4D', i: 'Y' },\n        { d: 2, l: '41%', t: '63%', c: '#00C2A8', i: 'M' },\n        { d: 4, l: '30%', t: '44%', c: '#FFA766', i: 'S' },\n        { d: 6, l: '63%', t: '33%', c: '#FF5B4D', i: 'Y' },\n        { d: 8, l: '80%', t: '15%', c: '#6A2D6F', i: 'L' },\n      ].filter((p) => p.d <= this.state.mapDay),\n      youTraceStyle: 'fill:none;stroke:#FF5B4D;stroke-width:3.5;stroke-linecap:round;opacity:' + (this.state.traces.you ? '0.95' : '0.12'),\n      maraTraceStyle: 'fill:none;stroke:#00C2A8;stroke-width:3.5;stroke-linecap:round;opacity:' + (this.state.traces.mara ? '0.95' : '0.12'),\n      lucaTraceStyle: 'fill:none;stroke:#FFA766;stroke-width:3.5;stroke-linecap:round;stroke-dasharray:2 7;opacity:' + (this.state.traces.luca ? '0.95' : '0.12'),\n      youChipStyle: 'display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:6px 11px;border-radius:999px;cursor:pointer;border:1px solid ' + (this.state.traces.you ? '#FF5B4D' : 'rgba(255,255,255,.18)') + ';background:' + (this.state.traces.you ? 'rgba(255,91,77,.18)' : 'transparent') + ';color:#fff',\n      maraChipStyle: 'display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:6px 11px;border-radius:999px;cursor:pointer;border:1px solid ' + (this.state.traces.mara ? '#00C2A8' : 'rgba(255,255,255,.18)') + ';background:' + (this.state.traces.mara ? 'rgba(0,194,168,.18)' : 'transparent') + ';color:#fff',\n      lucaChipStyle: 'display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:6px 11px;border-radius:999px;cursor:pointer;border:1px solid ' + (this.state.traces.luca ? '#FFA766' : 'rgba(255,255,255,.18)') + ';background:' + (this.state.traces.luca ? 'rgba(255,167,102,.18)' : 'transparent') + ';color:#fff',\n      setMapDay: (e) => this.setMapDay(e),\n      toggleYou: () => this.toggleTrace('you'),\n      toggleMara: () => this.toggleTrace('mara'),\n      toggleLuca: () => this.toggleTrace('luca'),\n\n      // — Trip Wrapped (Wave 3) —\n      wrappedNext: () => this.wrappedNext(),\n      w0: this.state.wrapped === 0,\n      w1: this.state.wrapped === 1,\n      w2: this.state.wrapped === 2,\n      w3: this.state.wrapped === 3,\n      wseg: [0, 1, 2, 3].map((i) => ({\n        style: 'flex:1;height:3px;border-radius:2px;background:' + (i <= this.state.wrapped ? '#C6FF00' : 'rgba(255,255,255,.28)'),\n      })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
