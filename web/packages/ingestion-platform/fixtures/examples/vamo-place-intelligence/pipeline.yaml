kind: ingestion.pipeline
version: 1
id: vamo-place-intelligence-fixture
name: Vamo Place Intelligence Fixture
owner: vamo
source:
  id: fsq-os-places-sample
  name: FSQ Open Source Places Sample
  adapter: fixture
  license:
    name: FSQ Open Source Places
    url: https://github.com/foursquare/os-places
    attribution: FSQ Open Source Places, Apache-2.0
    canStoreFacts: true
    canStoreContent: true
    canStoreMediaBytes: false
    liveOnly: false
  connection:
    fixturePath: fixtures/examples/vamo-place-intelligence/source.jsonl
target:
  id: vamo-place-intelligence-staging
  adapter: supabase_postgres
  project: vamo
  profile: place-intelligence
  dryRunOnly: true
cursor:
  strategy: monotonic_row_id
  field: source_row_id
policyRequests:
  storeFacts: true
  storeContent: true
  storeMediaBytes: false
mappings:
  - from: source.id
    to: location_source_refs.source_id
  - from: source.name
    to: location_canonicals.display_name
    transform: trim
  - from: source.latitude
    to: location_canonicals.latitude
  - from: source.longitude
    to: location_canonicals.longitude
qualityGates:
  - id: require-source-attribution
    type: attribution_present
    severity: block
  - id: reject-google-reusable-payloads
    type: live_only_source_guard
    severity: block
