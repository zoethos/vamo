kind: ingestion.target
version: 3
id: vamo-place-intelligence
name: Vamo Place Intelligence
adapter: supabase_postgres
engine:
  type: supabase_postgres
  dsnEnv: VAMO_STAGING_CANARY_APP_DATABASE_URL
  serviceRoleSecretEnv: VAMO_STAGING_SUPABASE_SERVICE_ROLE
  exposeServiceRoleToBrowser: false
security:
  serverSideOnly: true
  forbidBrowserServiceRole: true
  requireRlsOnExposedSchemas: true
  exposedSchemas:
    - public
  writeMode: dry_run
shipment:
  defaultMode: dry_run
  tables:
    - table: location_canonicals
      mode: upsert
      upsertKeys:
        - canonical_key
    - table: location_source_refs
      mode: upsert
      upsertKeys:
        - provider
        - source_place_id
