kind: ingestion.consumer_contract
consumer: vamo
profile: place-intelligence
version: 4
title: Vamo Place Intelligence Ingestion Contract
description: >-
  What Vamo asks the ingestion platform to ingest into its place cache: the source
  to read, the dry-run target shape, the policy gates that must hold, and a bounded
  no-network snapshot sample for validation. The platform imports a pinned snapshot
  of this bundle; it must not read the Vamo repo at runtime.
exports:
  pipeline: pipeline.yaml
  target: target.yaml
  fixtures:
    - fixtures/source.jsonl
display:
  queue:
    fields:
      - key: poi_type
        label: POI type
        source: scope.category
        presenter: vamo_poi_type
        detail:
          source: scope.category
          presenter: vamo_feature_type_mapping
