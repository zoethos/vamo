name: Claude code review

# Reviews pull requests. anthropics/claude-code-action@v1 does not support
# push events, so running it on main pushes makes the workflow fail before
# review starts.
on:
  pull_request:
    branches: [main]

jobs:
  review:
    # Skip pure doc/asset pushes via commit message convention if desired:
    # if: "!contains(github.event.head_commit.message, '[skip review]')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write          # gh pr comment creates an issue comment
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0     # need history to diff the pushed range

      - id: claude-review
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Avoid Claude GitHub App workflow-file validation on PRs that edit
          # this workflow; comments will be posted by github-actions[bot].
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --allowedTools "Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(gh api:*),Bash(gh pr comment:*),Read,Grep,Glob"
          prompt: |
            You are reviewing a pull request to main in the Vamo repo (Flutter/Dart
            melos monorepo + Supabase SQL migrations + future TS web tier).

            The PR range is ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}.
            Run: git diff ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}.

            Review ONLY the changed code, prioritized:
            1. Security: RLS policy changes, SQL migrations, auth flows, any
               user-facing string that leaks exception/framework/vendor details
               (project policy: catalogued error messages only).
            2. Correctness: money math must be integer cents (never floats),
               the share invariant (sum of shares == base_cents), sync/outbox
               idempotency, offline-first violations.
            3. Conventions from CONTRIBUTING.md and the README's load-bearing
               conventions section.

            Then post your findings as a PR comment using:
            gh pr comment ${{ github.event.pull_request.number }} --body "..."

            Format: a short verdict line (CLEAN / FINDINGS), then numbered
            findings each with severity (P1/P2/P3), file, and a one-line fix.
            If the diff is docs/assets only, post "CLEAN — docs only" and stop.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Warn if Claude review did not complete
        if: steps.claude-review.outcome == 'failure'
        run: |
          echo "::warning::Claude code review failed. Check the ANTHROPIC_API_KEY repository secret and the Claude action logs."
