name: osv-scan
on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
permissions:
  actions: read
  contents: read
  security-events: write
jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        ./
  sharp-reachability-guard:
    name: sharp-reachability-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
      - run: node --test web/scripts/osv-sharp-reachability-guard.test.mjs
      - run: node web/scripts/osv-sharp-reachability-guard.mjs
