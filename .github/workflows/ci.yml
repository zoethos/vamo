name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Deno
        shell: bash
        run: |
          set -euo pipefail
          deno_version="2.8.2"
          deno_zip="deno-x86_64-unknown-linux-gnu.zip"
          deno_dir="$RUNNER_TEMP/deno"
          curl -fsSL --retry 5 --retry-delay 2 \
            -o "$RUNNER_TEMP/$deno_zip" \
            "https://github.com/denoland/deno/releases/download/v${deno_version}/${deno_zip}"
          mkdir -p "$deno_dir"
          unzip -q "$RUNNER_TEMP/$deno_zip" -d "$deno_dir"
          echo "$deno_dir" >> "$GITHUB_PATH"
          "$deno_dir/deno" --version

      - name: Check Supabase Edge Functions
        shell: bash
        run: |
          set -euo pipefail
          for fn in fx-rates resolve-theme scheduled-heartbeat send-auth-email send-push trip-lifecycle-jobs; do
            pushd "supabase/functions/$fn"
            deno install --frozen --entrypoint index.ts
            deno check index.ts
            popd
          done
          # draft-trip-route uses explicit jsr: imports (no lockfile); type-check directly.
          deno check supabase/functions/draft-trip-route/index.ts

      - name: Test Supabase Edge Functions
        shell: bash
        # CI-safe: no --allow-net, so no live/paid provider calls. Locks the
        # deterministic draft + feasibility + eval fixtures (Slices 4–5).
        run: deno test --allow-env --allow-read supabase/functions

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create env asset (gitignored; pubspec declares it as an asset)
        run: cp .env.example app/.env

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Codegen, analyze, test
        run: melos run ci
