version: 2
updates:
  # Flutter/Dart melos monorepo — root + app + every package
  - package-ecosystem: "pub"
    directories: ["/", "/app", "/packages/*"]
    schedule:
      interval: "weekly"
    groups:
      dart-minor-patch:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  # npm — repo root + web tier
  - package-ecosystem: "npm"
    directories: ["/", "/web"]
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # Android Gradle plugins (AGP, Kotlin, Google Services) in settings.gradle.kts
  - package-ecosystem: "gradle"
    directory: "/app/android"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Edge functions — Dependabot reads function-local deno.json manifests, not
  # raw .ts import URLs. Keep each function isolated for Supabase deployment.
  # See docs/SECURITY_PATCHING.md §2.1.
  - package-ecosystem: "deno"
    directories:
      - "/supabase/functions/fx-rates"
      - "/supabase/functions/scheduled-heartbeat"
      - "/supabase/functions/send-auth-email"
      - "/supabase/functions/send-push"
      - "/supabase/functions/trip-lifecycle-jobs"
    schedule:
      interval: "weekly"
