name: vamo

packages:
  - app
  - packages/**

command:
  bootstrap:
    runPubGetInParallel: true

scripts:
  analyze:
    description: Analyze all packages
    run: melos exec -- "flutter analyze ."

  test:
    description: Run all tests
    run: melos exec --dir-exists=test -- "flutter test"

  build_runner:
    description: Run codegen across packages that need it
    run: melos exec --depends-on="build_runner" -- "dart run build_runner build --delete-conflicting-outputs"

  ci:
    description: Codegen then analyze and test (required ordering for Drift)
    run: melos run build_runner && melos run analyze && melos run test

  android:
    description: Run the app on the first connected Android device
    run: powershell -ExecutionPolicy Bypass -File tool/run_android.ps1

  chrome:
    description: Run the app in Chrome on the Supabase-redirect-listed port
    run: cd app && flutter run -d chrome --web-port 3000
