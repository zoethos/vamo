name: vamo

packages:
  - app
  - packages/**

command:
  bootstrap:
    runPubGetInParallel: true

scripts:
  analyze:
    description: Analyze all packages
    run: melos exec -- "flutter analyze ."

  test:
    description: Run all tests
    run: melos exec --dir-exists=test -- "flutter test"

  build_runner:
    description: Run codegen across packages that need it
    run: melos exec --depends-on="build_runner" -- "dart run build_runner build --delete-conflicting-outputs"

  gen-l10n:
    description: Generate localizations (gitignored; regenerated from ARB so CI is self-contained)
    run: melos exec --scope="vamo" -- "flutter gen-l10n"

  arch-guard:
    description: Enforce architecture import boundaries and token ratchets
    run: dart run tool/arch_guard_test.dart && dart run tool/arch_guard.dart

  scenario-sim:
    description: Run the Cycle 2 staging multi-user scenario simulator
    run: dart run tool/scenario_sim.dart

  ci:
    description: Codegen, architecture guard, analyze, and test
    run: melos run build_runner && melos run gen-l10n && melos run arch-guard && melos run analyze && melos run test

  android:
    description: Run the app on the first connected Android device
    run: powershell -ExecutionPolicy Bypass -File tool/run_android.ps1

  backfill_receipt_ocr:
    description: OCR backfill place_label from stored receipts (Android/iOS device)
    run: cd app && flutter run -t lib/dev/backfill_receipt_ocr.dart

  chrome:
    description: Run the app in Chrome on the Supabase-redirect-listed port
    run: cd app && flutter run -d chrome --web-port 3000
