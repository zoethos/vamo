name: feature_split
description: SplitTrip feature surface — auth, trips, expenses, balances, settle-up, snapshot.
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.6.0 <4.0.0"  # Dart 3.6 = Flutter 3.27+ (Color.withValues)
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  app_core:
    path: ../app_core
  drift: ^2.20.0
  exif: ^3.3.0
  geocoding: ^5.0.0
  flutter_map: ^8.3.1
  flutter_riverpod: ^2.5.1
  flutter_slidable: ^4.0.3
  google_mlkit_text_recognition: ^0.16.0
  go_router: ^14.2.0
  http: ^1.2.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  latlong2: ^0.10.1
  mobile_scanner: ^7.3.0
  path_provider: ^2.1.4
  qr_flutter: ^4.1.0
  share_plus: ^12.0.2
  supabase_flutter: ^2.5.6
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  video_player: ^2.11.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_localizations:
    sdk: flutter
  flutter_test:
    sdk: flutter
  path_provider_platform_interface: ^2.1.2

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
