publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.6.0 <4.0.0"  # Dart 3.6 = Flutter 3.27+ (Color.withValues)
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  app_core:
    path: ../app_core
  drift: ^2.20.0
  exif: ^3.3.0
  geocoding: ^3.0.0
  flutter_riverpod: ^2.5.1
  google_mlkit_text_recognition: ^0.14.0
  go_router: ^14.2.0
  http: ^1.2.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  path_provider: ^2.1.4
  share_plus: ^10.0.0
  supabase_flutter: ^2.5.6
  url_launcher: ^6.3.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_localizations:
    sdk: flutter
  flutter_test:
    sdk: flutter
