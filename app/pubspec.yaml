name: vamo
description: Vamo — trips, together.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"  # Dart 3.6 = Flutter 3.27+ (Color.withValues)
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  app_core:
    path: ../packages/app_core
  feature_split:
    path: ../packages/feature_split
  app_links: ^6.3.2
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  intl: ^0.20.2
  sqlite3_flutter_libs: ^0.5.24
  supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
